# Nyhetskilder. Seeded inn i databasen ved første oppstart hvis tabellen er tom.
# Etterpå kan du redigere kilder direkte i DB (eller slette avisa.db for re-seed).
#
# kind: "rss"        -> RSS/Atom-feed (feedparser)
#       "api"        -> JSON-API (foreløpig støttes Hacker News / Algolia)
#       "playwright" -> renderer en oversiktsside og plukker artikkel-lenker
#                       via CSS-selector i config.link_selector
# section: brukes som fallback-seksjon før kuratering evt. overstyrer.
# lang:    ISO-språkkode for kildens innhold ("no", "en", …). Saker fra kilder
#          på et språk i skip-lista (innstillinger) oversettes ikke, men vises
#          på originalspråk.
#
# Fulltekst for hver sak hentes uansett kilde i content-fasen (statisk først,
# Playwright som fallback for JS-tunge sider).

- name: NRK Nyheter
  kind: rss
  url: https://www.nrk.no/nyheter/siste.rss
  section: Innenriks
  lang: no

- name: BBC World
  kind: rss
  url: https://feeds.bbci.co.uk/news/world/rss.xml
  section: Utenriks
  lang: en

- name: The Guardian
  kind: rss
  url: https://www.theguardian.com/world/rss
  section: Utenriks
  lang: en

- name: Ars Technica
  kind: rss
  url: https://feeds.arstechnica.com/arstechnica/index
  section: Teknologi
  lang: en

- name: Hacker News
  kind: api
  url: https://hn.algolia.com/api/v1/search?tags=front_page
  section: Teknologi
  lang: en

# Eksempel på en feedløs, JS-rendret kilde via Playwright. Avskrudd som
# standard — skru på (enabled: true) og juster link_selector til siden din.
- name: Eksempel (Playwright)
  kind: playwright
  url: https://example.com/news
  section: Nyheter
  lang: en
  enabled: false
  config:
    link_selector: "a.article-link"
    limit: 30
