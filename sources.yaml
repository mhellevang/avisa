# News sources. Seeded into the database on first startup if the table is empty.
# After that you can edit sources directly in the DB (or delete avisa.db to re-seed).
#
# kind: "rss"        -> RSS/Atom feed (feedparser)
#       "api"        -> JSON API (currently Hacker News / Algolia is supported)
#       "playwright" -> renders an overview page and picks article links via a
#                       CSS selector in config.link_selector
# section: used as the fallback section before curation may override it.
# lang:    ISO language code for the source's content ("no", "en", …). Stories
#          from a source in a language on the skip list (settings) are not
#          translated but shown in the original.
#
# Full text for each story is fetched regardless of source in the content phase
# (static first, Playwright as a fallback for JS-heavy pages).

- name: NRK Nyheter
  kind: rss
  url: https://www.nrk.no/nyheter/siste.rss
  section: Domestic
  lang: no

- name: BBC World
  kind: rss
  url: https://feeds.bbci.co.uk/news/world/rss.xml
  section: World
  lang: en

- name: The Guardian
  kind: rss
  url: https://www.theguardian.com/world/rss
  section: World
  lang: en

- name: Ars Technica
  kind: rss
  url: https://feeds.arstechnica.com/arstechnica/index
  section: Technology
  lang: en

- name: Hacker News
  kind: api
  url: https://hn.algolia.com/api/v1/search?tags=front_page
  section: Technology
  lang: en

# Example of a feedless, JS-rendered source via Playwright. Disabled by
# default — enable it (enabled: true) and adjust link_selector to your page.
- name: Example (Playwright)
  kind: playwright
  url: https://example.com/news
  section: News
  lang: en
  enabled: false
  config:
    link_selector: "a.article-link"
    limit: 30
