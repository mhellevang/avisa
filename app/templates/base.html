<!DOCTYPE html>
<html lang="{{ ui_lang() }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ paper_title() }}{% endblock %}</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#7a2b1d">
  <script>
    /* Apply the saved theme before paint (no flash), and align the
       browser theme-color with the effective light/dark choice. */
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
        var dark = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = dark ? "#1b1916" : "#7a2b1d";
      } catch (e) {}
    })();
  </script>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="{{ paper_title() }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Spectral:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/magic.css">
</head>
<body>
  <div class="paper grain">
    {% block body %}{% endblock %}
    <footer class="colophon">
      <span>{{ paper_title() }}</span> · {{ t("a personal newspaper · built in the background, always ready") }}
      <div class="colophon-actions">
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="{{ t('Toggle dark mode') }}" title="{{ t('Toggle dark mode') }}">☾</button>
      </div>
    </footer>
  </div>
  <script>
    /* Gate the ink-draw reveal on a real paint: add `.inked` after two rAFs so
       a frozen / offscreen / print render just shows the finished text. */
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        document.documentElement.classList.add("inked");
      });
    });
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function () {});
      });
    }
    /* Light/dark toggle. No stored choice = follow the system; a click
       sets an explicit preference that overrides it. */
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      var meta = document.querySelector('meta[name="theme-color"]');
      function effective() {
        return document.documentElement.dataset.theme ||
          (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      }
      function sync() { btn.textContent = effective() === "dark" ? "☀" : "☾"; }
      sync();
      btn.addEventListener("click", function () {
        var next = effective() === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        try { localStorage.setItem("theme", next); } catch (e) {}
        if (meta) meta.content = next === "dark" ? "#1b1916" : "#7a2b1d";
        sync();
      });
    })();
  </script>
</body>
</html>
