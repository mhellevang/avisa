name: Build image

# On every push to main: build the image and push it to GHCR. That's it.
# The deploy target (TrueNAS SCALE) pulls the image itself — see deploy/TRUENAS.md.
# Nothing is deployed over SSH from CI, and no app secrets ever enter CI.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual "Run workflow" too

concurrency:
  group: build-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/mhellevang/avisa

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64   # TrueNAS SCALE is x86_64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
