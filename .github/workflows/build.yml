name: Build image

# Push to main: build the image and push it to GHCR. On PRs: build only (verify,
# no push). The deploy target (TrueNAS SCALE) pulls the image itself — see
# deploy/TRUENAS.md. Nothing is deployed over SSH from CI, no app secrets enter CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]      # build (without pushing) on PRs to verify before merge
  workflow_dispatch: {}   # allow manual "Run workflow" too

concurrency:
  group: build-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/mhellevang/avisa

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'   # only needed for the push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}   # PRs build only, don't push
          platforms: linux/amd64   # TrueNAS SCALE is x86_64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
