services:
  avisa:
    # Local dev builds from the Dockerfile and tags it as this image.
    # In production CI builds + pushes this tag to GHCR and the server only pulls it
    # (see .github/workflows/deploy.yml — the server runs `pull` + `up --no-build`).
    image: ghcr.io/mhellevang/avisa:latest
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the DB path so it lands in the persistent volume
      DATABASE_URL: sqlite:////data/avisa.db
    volumes:
      - avisa-data:/data
    restart: unless-stopped

volumes:
  avisa-data:
