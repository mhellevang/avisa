services:
  avisa:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the DB path so it lands in the persistent volume
      DATABASE_URL: sqlite:////data/avisa.db
    volumes:
      - avisa-data:/data
    restart: unless-stopped

volumes:
  avisa-data:
