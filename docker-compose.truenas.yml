# Self-host on TrueNAS SCALE via Cloudflare Tunnel.
#
# No reverse proxy, no open ports, no Let's Encrypt: the Cloudflare Tunnel
# terminates TLS at Cloudflare's edge and forwards plain traffic to the app over
# the internal compose network. Your home IP is never exposed.
#
# This is a standalone stack (it does NOT layer on docker-compose.yml). Deploy it
# as-is via Dockge/Portainer on TrueNAS SCALE, or `docker compose -f
# docker-compose.truenas.yml up -d`. See deploy/TRUENAS.md.
#
# The SQLite DB is just cached, reproducible news — a plain named volume is fine,
# no ZFS dataset / snapshots needed. Lose it and the paper rebuilds itself.

services:
  avisa:
    image: ghcr.io/mhellevang/avisa:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/avisa.db
    volumes:
      - avisa-data:/data
    # Let Watchtower auto-update this container when :latest changes in GHCR.
    # Scoped by label so Watchtower only touches this stack (WATCHTOWER_LABEL_ENABLE).
    labels:
      - com.centurylinklabs.watchtower.enable=true
    # No published ports — cloudflared reaches it internally at http://avisa:8000.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - avisa

  # Polls GHCR and recreates avisa when ghcr.io/mhellevang/avisa:latest changes,
  # so a `git push origin main` (which CI builds + pushes) reaches the NAT'd box
  # on its own. Trade-off: a bad push auto-deploys — drop this service and use
  # Dockge/Portainer "Pull + Up" manually if you'd rather approve each update.
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"   # only update labelled containers
      WATCHTOWER_CLEANUP: "true"        # prune old images after updating
    command: --interval 30              # poll every 30s — deploy lands ~30s after CI

volumes:
  avisa-data:
